version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: backend
    #ports:
     # - "5000:5000"
    command: python app.py
    networks:
      - app-network

  nginx-frontend:
    build:
      context: ./frontend
      #args:
        # REACT_APP_API_URL: http://localhost:3000  
    container_name: nginx-frontend
    ports:
      - "3000:80"
    volumes:
      # - ./system-monitor.conf:/etc/nginx/sites-enabled/system-monitor.conf
      # - - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./system-monitor.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge